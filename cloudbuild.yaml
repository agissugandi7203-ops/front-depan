steps:
  # Build and Deploy frontend directly to Cloud Run using --source option with build-args
  # This avoids manual docker push to deprecated gcr.io and auto-creates Artifact Registry repositories
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'frontdepan'
      - '--source'
      - '.'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--build-arg'
      - 'VITE_API_BASE_URL=https://backbelakang-12178843429.asia-southeast1.run.app'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=https://qaenpoqkwixilczeqwyv.supabase.co'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhZW5wb3Frd2l4aWxjemVxd3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTc3NzksImV4cCI6MjA5ODg5Mzc3OX0.o4ZfQSsA_6vpTbEvTh9mBgVXix2jbeaL6T5GCNeNnp4'

options:
  logging: CLOUD_LOGGING_ONLY
